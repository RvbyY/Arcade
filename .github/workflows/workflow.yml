name: Workflow test compilation with cmake

on:
  push:
    branches-ignore:
      - ga-ignore-*
  pull_request:
    branches-ignore:
      - ga-ignore-*

jobs:
  check_program_compilation:
    name: Checking compilation
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure build with CMake
        id: check_program_compilation
        run: |
          mkdir -p build
          cmake -S . -B build
        timeout-minutes: 5

      - name: Build project
        run: cmake --build build
        timeout-minutes: 5

      - name: Check arcade executable
        run: |
          test -x ./arcade
